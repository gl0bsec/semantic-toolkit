<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Semantic Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #000;
            border-bottom: 1px solid #333;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            font-size: 11px;
        }

        #title {
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        #title a {
            color: inherit;
            text-decoration: none;
        }

        #title a:hover {
            text-decoration: underline;
        }

        #controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        #controls label {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #controls input[type="checkbox"] {
            cursor: pointer;
        }

        #controls a {
            color: inherit;
            text-decoration: none;
            font-size: 10px;
        }

        #controls a:hover {
            text-decoration: underline;
        }

        #stats {
            font-size: 10px;
            color: #888;
        }

        #canvas-container {
            position: fixed;
            top: 33px;
            left: 0;
            right: 300px;
            bottom: 80px;
        }

        #timeline-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 300px;
            height: 80px;
            background: #000;
            border-top: 1px solid #333;
            border-right: 1px solid #333;
        }

        #timeline-container svg {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        #sidebar {
            position: fixed;
            top: 33px;
            right: 0;
            width: 300px;
            bottom: 0;
            background: #000;
            border-left: 1px solid #333;
            overflow-y: auto;
            font-size: 10px;
            padding: 12px;
        }

        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-track { background: #000; }
        #sidebar::-webkit-scrollbar-thumb { background: #333; }

        .item {
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 0;
            cursor: pointer;
            transition: background 0.1s;
        }

        .item:hover { background: #0a0a0a; }
        .item.selected { background: #1a1a1a; }

        .item.highlighted {
            background: #fff !important;
            color: #000 !important;
        }

        .item.highlighted .item-title { color: #000 !important; }
        .item.highlighted .item-meta { color: #333 !important; }
        .item.highlighted .item-link { color: #0066cc !important; }

        .item-title {
            font-weight: bold;
            margin-bottom: 4px;
            line-height: 1.3;
            color: #fff;
        }

        .item-meta {
            color: #666;
            margin-bottom: 3px;
            font-size: 9px;
        }

        .item-cluster {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: bold;
            margin-top: 4px;
        }

        .item-link {
            color: #4a90e2;
            text-decoration: none;
            font-size: 9px;
            word-break: break-all;
        }

        .item-link:hover { text-decoration: underline; }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            color: #666;
        }

        #tooltip {
            position: fixed;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #ddd;
            padding: 8px 12px;
            font-size: 10px;
            line-height: 1.4;
            pointer-events: none;
            display: none;
            z-index: 1000;
            max-width: 300px;
        }

        #tooltip .tooltip-title {
            font-weight: bold;
            margin-bottom: 4px;
            color: #000;
        }

        #tooltip .tooltip-meta {
            color: #666;
            font-size: 9px;
        }

        #tooltip .tooltip-cluster {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: bold;
            margin-top: 4px;
        }

        #summary-table {
            position: fixed;
            bottom: 80px;
            right: 300px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid #333;
            border-left: 1px solid #333;
            padding: 12px;
            font-size: 9px;
            z-index: 50;
            min-width: 180px;
            max-height: 300px;
            pointer-events: auto;
        }

        #summary-table .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1;
        }

        #summary-table .table-content {
            max-height: 250px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #summary-table .table-content::-webkit-scrollbar { width: 4px; }
        #summary-table .table-content::-webkit-scrollbar-track { background: #000; }
        #summary-table .table-content::-webkit-scrollbar-thumb { background: #333; }

        #summary-table .table-title {
            font-weight: bold;
            color: #fff;
            font-size: 10px;
        }

        #summary-table .table-toggle {
            color: #4a90e2;
            cursor: pointer;
            font-size: 8px;
            text-decoration: underline;
        }

        #summary-table .table-toggle:hover { color: #74b9ff; }

        #summary-table table {
            width: 100%;
            border-collapse: collapse;
        }

        #summary-table td {
            padding: 4px 0;
            color: #aaa;
        }

        #summary-table tr {
            cursor: pointer;
            transition: background 0.1s;
        }

        #summary-table tr:hover { background: #1a1a1a; }
        #summary-table tr.selected { background: #1a1a1a; }

        #summary-table td:first-child {
            color: #fff;
            padding-right: 12px;
        }

        #summary-table td:last-child {
            text-align: right;
            font-weight: bold;
            color: #4a90e2;
        }

        #summary-table .cluster-color {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="title"><a href="/home/home.html">⌂</a> / <a id="dataset-link" href="#">DATASET</a> / 3D SEMANTIC SPACE</div>
        <div id="controls">
            <label>
                <input type="checkbox" id="toggle-outliers" checked>
                OUTLIERS
            </label>
            <a id="sibling-link" href="#">DASHBOARD</a>
            <div id="stats"></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="sidebar"></div>

    <div id="timeline-container"></div>

    <div id="summary-table">
        <div class="table-header">
            <div class="table-title" id="summary-title">TYPE</div>
            <div class="table-toggle" id="summary-toggle">CLUSTER</div>
        </div>
        <div class="table-content">
            <table id="summary-table-body"></table>
        </div>
    </div>

    <div id="loading">LOADING DATA...</div>

    <div id="tooltip"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
