<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Home</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: #fff;
                color: #000;
                font-family: "Courier New", monospace;
                font-size: 10px;
            }

            #header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 33px;
                background: #fff;
                border-bottom: 1px solid #aaa;
                padding: 0 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                z-index: 100;
            }

            #header #title {
                font-size: 11px;
                font-weight: bold;
                letter-spacing: 0.5px;
                color: #000;
            }

            #main-container {
                position: fixed;
                top: 33px;
                left: 0;
                right: 0;
                bottom: 0;
                overflow: auto;
                padding: 24px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                border: 1px solid #ccc;
            }

            thead th {
                font-size: 9px;
                font-weight: bold;
                text-align: left;
                padding: 8px 12px;
                border-bottom: 1px solid #ccc;
                background: #f5f5f5;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            tbody tr {
                border-bottom: 1px solid #eee;
                cursor: pointer;
            }

            tbody tr:last-child {
                border-bottom: none;
            }

            tbody tr:hover {
                background: #fafafa;
            }

            tbody td {
                padding: 12px;
                vertical-align: top;
            }

            .dataset-name {
                font-size: 11px;
                font-weight: bold;
                color: #000;
                text-decoration: none;
                letter-spacing: 0.5px;
            }

            .dataset-name:hover {
                text-decoration: underline;
            }

            .col-modified {
                font-size: 9px;
                color: #444;
            }

            tr.new-pipe {
                background: #f5f5f5;
                cursor: default;
            }

            tr.new-pipe:hover {
                background: #f0f0f0;
            }

            tr.new-pipe td {
                color: #999;
                font-size: 9px;
                letter-spacing: 0.5px;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <div id="title">⌂</div>
        </div>

        <div id="main-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 220px">Dataset</th>
                        <th style="width: 80px">Type</th>
                        <th style="width: 140px">Created</th>
                        <th style="width: 140px">Modified</th>
                        <th style="width: 80px">Views</th>
                    </tr>
                </thead>
                <tbody>
                    <tr onclick="location.href='../RU_AFR_EXPERIMENT/index.html'">
                        <td>
                            <a class="dataset-name" href="../RU_AFR_EXPERIMENT/index.html">RU_AFR_EXPERIMENT</a>
                        </td>
                        <td class="col-modified">csv</td>
                        <td class="col-modified">26-02-03</td>
                        <td class="col-modified">26-03-05</td>
                        <td class="col-modified">2</td>
                    </tr>
                    <tr class="new-pipe">
                        <td>+ create new project</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </body>
</html>
