<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Data Analysis Dashboard</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: #fff;
                color: #000;
                font-family: "Courier New", monospace;
                font-size: 10px;
                overflow: hidden;
            }

            #header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 33px;
                background: #fff;
                border-bottom: 1px solid #aaa;
                padding: 0 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                z-index: 100;
            }

            #header #title {
                font-size: 11px;
                font-weight: bold;
                letter-spacing: 0.5px;
                color: #000;
            }

            #header #title a {
                color: inherit;
                text-decoration: none;
            }

            #header #title a:hover {
                text-decoration: underline;
            }

            #header-info {
                font-size: 9px;
                color: #666;
            }

            #main-container {
                position: fixed;
                top: 33px;
                left: 0;
                right: 0;
                bottom: 0;
                overflow: auto;
            }

            /* Fix #8: removed outer padding so grid touches edges;
       gap provides the only separator lines */
            #grid {
                display: grid;
                grid-template-columns: repeat(12, 1fr);
                gap: 1px;
                background: #ccc;
                min-height: 100%;
            }

            .grid-item {
                background: #fff;
                border: none;
                padding: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .grid-item-header {
                font-size: 11px;
                font-weight: bold;
                color: #000;
                padding: 12px;
                border-bottom: 1px solid #ccc;
                flex-shrink: 0;
                background: #fff;
            }

            /* Fix #1: Single .grid-item-content definition (merged) */
            .grid-item-content {
                flex: 1;
                overflow: auto;
                max-height: 100%;
                padding: 12px;
                background: #fff;
            }

            .grid-item-content.no-pad {
                padding: 0;
            }

            /* Timeline specific styles */
            #timeline-canvas {
                display: block;
                width: 100%;
                height: 100%;
                cursor: pointer;
            }

            .loading {
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                color: #666;
                height: 200px;
            }

            /* Utility classes for grid sizing */
            .span-3 {
                grid-column: span 3;
            }
            .span-4 {
                grid-column: span 4;
            }
            .span-6 {
                grid-column: span 6;
            }
            .span-8 {
                grid-column: span 8;
            }
            .span-12 {
                grid-column: span 12;
            }

            .height-1 {
                height: 200px;
            }
            .height-2 {
                height: 520px;
            }
            .height-3 {
                height: 460px;
            }

            /* Scrollbar styling for light theme */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }

            ::-webkit-scrollbar-track {
                background: #f0f0f0;
            }

            ::-webkit-scrollbar-thumb {
                background: #ccc;
                border-radius: 0;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #999;
            }

            /* Table styles */
            .data-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 9px;
            }

            /* Fix #11: Standardized th/td vertical padding to 8px */
            .data-table th {
                text-align: left;
                padding: 8px;
                background: #f5f5f5;
                border-bottom: 1px solid #ccc;
                font-weight: bold;
                position: sticky;
                top: 0;
                z-index: 1;
            }

            .data-table td {
                padding: 8px;
                border-bottom: 1px solid #eee;
            }

            .data-table tr:hover {
                background: #fafafa;
                cursor: pointer;
            }

            /* Fix #5: Unified selection color — neutral light gray across all widgets */
            .data-table tr.selected {
                background: #f0f0f0;
                font-weight: bold;
            }

            .data-table tr.selected:hover {
                background: #e8e8e8;
            }

            .data-table .numeric {
                text-align: right;
                font-weight: bold;
            }

            /* Cluster table specific — only overrides that differ from .data-table */
            .cluster-table {
                font-size: 10px;
                border-collapse: separate;
                border-spacing: 0;
            }

            .cluster-table th {
                font-size: 10px;
                z-index: 10;
            }

            .cluster-table td {
                line-height: 1.3;
            }

            /* Fix #9: Feed items edge-to-edge borders (no container padding) */
            .feed-item {
                border-bottom: 1px solid #eee;
                padding: 12px;
                cursor: pointer;
                transition: background 0.1s;
            }

            .feed-item:first-child {
                padding-top: 12px;
            }

            .feed-item:hover {
                background: #fafafa;
            }

            /* Fix #5: Unified selection color for feed items */
            .feed-item.selected {
                background: #f0f0f0;
            }

            .feed-item-title {
                font-weight: bold;
                margin-bottom: 4px;
                line-height: 1.3;
                color: #000;
                font-size: 10px;
            }

            .feed-item-meta {
                color: #666;
                margin-bottom: 3px;
                font-size: 9px;
            }

            .feed-item-cluster {
                display: inline-block;
                padding: 2px 8px;
                background: #f0f0f0;
                border: 1px solid #ccc;
                font-size: 9px;
                font-weight: bold;
                margin-top: 4px;
                color: #000;
            }

            .feed-item-link {
                color: #4a90e2;
                text-decoration: none;
                font-size: 9px;
                word-break: break-all;
            }

            .feed-item-link:hover {
                text-decoration: underline;
            }

            /* Fix #4: Feed wrapper uses flex instead of hardcoded max-height */
            .feed-wrapper {
                flex: 1;
                overflow-y: auto;
            }
        </style>
        <script src="../shared/colors.js"></script>
        <script src="../shared/filters.js"></script>
    </head>
    <body>
        <div id="header">
            <div id="title">⌂ / <a href="../home/index.html">RU_AFR_EXPERIMENT</a> / ANALYSIS DASHBOARD</div>
            <div id="header-info">
                <span id="data-count">Loading...</span>
            </div>
        </div>

        <div id="main-container">
            <div id="grid">
                <!-- Fix #7: Changed from flex 3:1 to 2:1 split for wider cluster panel -->
                <!-- Fix #2: Inner divider now 1px solid #ccc, matching grid gap visual weight -->
                <div
                    class="grid-item span-12 height-2"
                    style="display: flex; flex-direction: row; gap: 0"
                >
                    <div
                        style="
                            flex: 2;
                            display: flex;
                            flex-direction: column;
                            border-right: 1px solid #ccc;
                            min-width: 0;
                        "
                    >
                        <div class="grid-item-header">
                            TEMPORAL DISTRIBUTION (June 2025 onward)
                            <label
                                style="
                                    margin-left: 20px;
                                    font-weight: normal;
                                    font-size: 9px;
                                    cursor: pointer;
                                "
                            >
                                <input
                                    type="checkbox"
                                    id="stacked-mode-toggle"
                                    style="margin-right: 4px"
                                />
                                Stacked by Type
                            </label>
                        </div>
                        <div style="flex: 1; padding: 12px; min-height: 0">
                            <canvas id="timeline-canvas"></canvas>
                        </div>
                    </div>
                    <div
                        style="
                            flex: 1;
                            display: flex;
                            flex-direction: column;
                            min-width: 0;
                        "
                    >
                        <div class="grid-item-header">CLUSTER ANALYSIS</div>
                        <div
                            style="
                                flex: 1;
                                overflow-y: auto;
                                overflow-x: hidden;
                                padding: 0;
                                min-height: 0;
                            "
                        >
                            <table
                                class="data-table cluster-table"
                                id="cluster-table"
                                style="margin: 0"
                            >
                                <thead>
                                    <tr>
                                        <th>Cluster</th>
                                        <th class="numeric">Count</th>
                                        <th class="numeric">Dist</th>
                                    </tr>
                                </thead>
                                <tbody id="cluster-table-body">
                                    <tr>
                                        <td
                                            colspan="3"
                                            style="
                                                text-align: center;
                                                color: #666;
                                            "
                                        >
                                            Loading...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div
                    class="grid-item span-6 height-3"
                    id="location-mentions-container"
                >
                    <div class="grid-item-header">
                        EVENT LOCATIONS
                        <label
                            style="
                                margin-left: 20px;
                                font-weight: normal;
                                font-size: 9px;
                                cursor: pointer;
                            "
                        >
                            <input
                                type="checkbox"
                                id="african-only-checkbox"
                                style="margin-right: 4px"
                            />
                            <span id="region-filter-label">African locations only</span>
                        </label>
                    </div>
                    <!-- Fix #9: no-pad class for edge-to-edge table borders -->
                    <div class="grid-item-content no-pad">
                        <table
                            class="data-table cluster-table"
                            id="location-table"
                            style="margin: 0"
                        >
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Location Name</th>
                                    <th class="numeric">Count</th>
                                </tr>
                            </thead>
                            <tbody id="location-table-body">
                                <tr>
                                    <td
                                        colspan="3"
                                        style="text-align: center; color: #666"
                                    >
                                        Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Fix #4 & #9: Feed uses no-pad content + flex wrapper for proper sizing -->
                <div class="grid-item span-6 height-3" id="data-feed-container">
                    <div class="grid-item-header">
                        DATA FEED (Reverse Chronological)
                    </div>
                    <div
                        class="grid-item-content no-pad"
                        style="display: flex; flex-direction: column"
                    >
                        <div class="feed-wrapper" id="data-feed">
                            <div
                                style="
                                    text-align: center;
                                    color: #666;
                                    padding: 20px;
                                "
                            >
                                Loading...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="dashboard.js"></script>

    </body>
</html>
