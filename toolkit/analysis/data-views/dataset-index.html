<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dataset</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: #fff;
                color: #000;
                font-family: "Courier New", monospace;
                font-size: 10px;
            }

            #header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 33px;
                background: #fff;
                border-bottom: 1px solid #aaa;
                padding: 0 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                z-index: 100;
            }

            #header #title a {
                color: inherit;
                text-decoration: none;
            }

            #header #title a:hover {
                text-decoration: underline;
            }

            #header #title {
                font-size: 11px;
                font-weight: bold;
                letter-spacing: 0.5px;
                color: #000;
            }

            #main-container {
                position: fixed;
                top: 33px;
                left: 0;
                right: 0;
                bottom: 0;
                overflow: auto;
                padding: 24px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                border: 1px solid #ccc;
            }

            thead th {
                font-size: 9px;
                font-weight: bold;
                text-align: left;
                padding: 8px 12px;
                border-bottom: 1px solid #ccc;
                background: #f5f5f5;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            tbody tr {
                border-bottom: 1px solid #eee;
                cursor: pointer;
            }

            tbody tr:last-child {
                border-bottom: none;
            }

            tbody tr:hover {
                background: #fafafa;
            }

            tbody td {
                padding: 12px;
                vertical-align: top;
            }

            .page-name {
                font-size: 11px;
                font-weight: bold;
                color: #000;
                text-decoration: none;
                letter-spacing: 0.5px;
            }

            .page-name:hover {
                text-decoration: underline;
            }

            .page-type {
                font-size: 9px;
                color: #666;
                padding-top: 2px;
            }

            .page-modified {
                font-size: 9px;
                color: #444;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <div id="title"><a href="/home/home.html">&#8962;</a> / <span id="dataset-name"></span></div>
        </div>

        <div id="main-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 220px">View</th>
                    </tr>
                </thead>
                <tbody id="views-body"></tbody>
            </table>
        </div>

        <script>
            const VIEW_PATHS = {
                'embedding-viewer': '/ui/data-views/embedding-viewer/embedding-viewer.html',
                'dashboard': '/ui/data-views/dashboard/dashboard.html',
            };

            const dataset = location.pathname.split('/')[1];
            document.getElementById('dataset-name').textContent = dataset;
            document.title = dataset;

            fetch('/api/config?dataset=' + dataset)
                .then(r => r.json())
                .then(config => {
                    const tbody = document.getElementById('views-body');
                    (config.views || []).forEach(view => {
                        const path = VIEW_PATHS[view];
                        if (!path) return;
                        const url = path + '?dataset=' + dataset;
                        const tr = document.createElement('tr');
                        tr.onclick = () => location.href = url;
                        tr.innerHTML = '<td><a class="page-name" href="' + url + '">' + view + '</a></td>';
                        tbody.appendChild(tr);
                    });
                });
        </script>
    </body>
</html>
