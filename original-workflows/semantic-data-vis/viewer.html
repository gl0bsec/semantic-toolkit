<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RU_AFR Semantic Data Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #000;
            border-bottom: 1px solid #333;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            font-size: 11px;
        }

        #title {
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        #title a {
            color: inherit;
            text-decoration: none;
        }

        #title a:hover {
            text-decoration: underline;
        }

        #controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        #controls label {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #controls input[type="checkbox"] {
            cursor: pointer;
        }

        #stats {
            font-size: 10px;
            color: #888;
        }

        #canvas-container {
            position: fixed;
            top: 33px;
            left: 0;
            right: 300px;
            bottom: 80px;
        }

        #timeline {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 300px;
            height: 80px;
            background: #000;
            border-top: 1px solid #333;
            border-right: 1px solid #333;
        }

        #timeline-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #sidebar {
            position: fixed;
            top: 33px;
            right: 0;
            width: 300px;
            bottom: 0;
            background: #000;
            border-left: 1px solid #333;
            overflow-y: auto;
            font-size: 10px;
            padding: 12px;
        }

        #sidebar::-webkit-scrollbar {
            width: 6px;
        }

        #sidebar::-webkit-scrollbar-track {
            background: #000;
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: #333;
        }

        .item {
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 0;
            cursor: pointer;
            transition: background 0.1s;
        }

        .item:hover {
            background: #0a0a0a;
        }

        .item.selected {
            background: #1a1a1a;
        }

        .item.highlighted {
            background: #fff !important;
            color: #000 !important;
        }

        .item.highlighted .item-title {
            color: #000 !important;
        }

        .item.highlighted .item-meta {
            color: #333 !important;
        }

        .item.highlighted .item-link {
            color: #0066cc !important;
        }

        .item-title {
            font-weight: bold;
            margin-bottom: 4px;
            line-height: 1.3;
            color: #fff;
        }

        .item-meta {
            color: #666;
            margin-bottom: 3px;
            font-size: 9px;
        }

        .item-cluster {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: bold;
            margin-top: 4px;
        }

        .item-link {
            color: #4a90e2;
            text-decoration: none;
            font-size: 9px;
            word-break: break-all;
        }

        .item-link:hover {
            text-decoration: underline;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            color: #666;
        }

        #tooltip {
            position: fixed;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #ddd;
            padding: 8px 12px;
            font-size: 10px;
            line-height: 1.4;
            pointer-events: none;
            display: none;
            z-index: 1000;
            max-width: 300px;
        }

        #tooltip .tooltip-title {
            font-weight: bold;
            margin-bottom: 4px;
            color: #000;
        }

        #tooltip .tooltip-meta {
            color: #666;
            font-size: 9px;
        }

        #tooltip .tooltip-cluster {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: bold;
            margin-top: 4px;
        }

        #summary-table {
            position: fixed;
            bottom: 80px;
            right: 300px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid #333;
            border-left: 1px solid #333;
            padding: 12px;
            font-size: 9px;
            z-index: 50;
            min-width: 180px;
            max-height: 300px;
            pointer-events: auto;
        }

        #summary-table .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1;
        }

        #summary-table .table-content {
            max-height: 250px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #summary-table .table-content::-webkit-scrollbar {
            width: 4px;
        }

        #summary-table .table-content::-webkit-scrollbar-track {
            background: #000;
        }

        #summary-table .table-content::-webkit-scrollbar-thumb {
            background: #333;
        }

        #summary-table .table-title {
            font-weight: bold;
            color: #fff;
            font-size: 10px;
        }

        #summary-table .table-toggle {
            color: #4a90e2;
            cursor: pointer;
            font-size: 8px;
            text-decoration: underline;
        }

        #summary-table .table-toggle:hover {
            color: #74b9ff;
        }

        #summary-table table {
            width: 100%;
            border-collapse: collapse;
        }

        #summary-table td {
            padding: 4px 0;
            color: #aaa;
        }

        #summary-table tr {
            cursor: pointer;
            transition: background 0.1s;
        }

        #summary-table tr:hover {
            background: #1a1a1a;
        }

        #summary-table tr.selected {
            background: #1a1a1a;
        }

        #summary-table td:first-child {
            color: #fff;
            padding-right: 12px;
        }

        #summary-table td:last-child {
            text-align: right;
            font-weight: bold;
            color: #4a90e2;
        }

        #summary-table .cluster-color {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="title">⌂ / <a href="index.html">RU_AFR_EXPERIMENT</a> / 3D SEMANTIC SPACE</div>
        <div id="controls">
            <label>
                <input type="checkbox" id="toggle-outliers" checked>
                OUTLIERS
            </label>
            <div id="stats"></div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="sidebar"></div>

    <div id="timeline">
        <canvas id="timeline-canvas"></canvas>
    </div>

    <div id="summary-table">
        <div class="table-header">
            <div class="table-title" id="summary-title">TYPE</div>
            <div class="table-toggle" id="summary-toggle">CLUSTER</div>
        </div>
        <div class="table-content">
            <table id="summary-table-body"></table>
        </div>
    </div>

    <div id="loading">LOADING DATA...</div>

    <div id="tooltip"></div>

    <script>
        // Cluster color palette (excluding outliers)
        const CLUSTER_COLORS = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7',
            '#dfe6e9', '#74b9ff', '#a29bfe', '#fd79a8', '#fdcb6e',
            '#e17055', '#00b894', '#00cec9', '#0984e3', '#6c5ce7',
            '#fd79a8', '#fab1a0', '#ff7675', '#d63031', '#e84393',
            '#55efc4', '#81ecec', '#74b9ff', '#a29bfe', '#ffeaa7',
            '#fd79a8', '#fdcb6e', '#e17055', '#d63031', '#00b894',
            '#00cec9', '#0984e3', '#6c5ce7', '#fd79a8', '#fab1a0',
            '#ff7675', '#e84393', '#55efc4'
        ];

        const OUTLIER_COLOR = '#ffff00'; // Bright yellow for outliers

        let data = [];
        let config = null;
        let showOutliers = true;
        let selectedIndex = null;
        let highlightTimeout = null;
        let selectedWeek = null;
        let selectedType = null;
        let selectedCluster = null;
        let selectedLocation = null;
        let summaryMode = 'type'; // 'type' or 'cluster'
        let camera = { x: 0, y: 0, z: 5, rotX: 0, rotY: 0 };
        let mouse = { x: 0, y: 0, down: false, lastX: 0, lastY: 0 };
        let lastDashboardFilterTimestamp = 0;

        // Load configuration
        async function loadConfig() {
            const response = await fetch('config.json');
            config = await response.json();
        }

        // Parse CSV
        async function loadData() {
            const response = await fetch(config.dataSource);
            const text = await response.text();
            const lines = text.split('\n');
            const headers = lines[0].split(',');

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (!line.trim()) continue;

                // Simple CSV parser (handles quoted fields)
                const values = [];
                let current = '';
                let inQuotes = false;

                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current);

                const row = {};
                headers.forEach((header, idx) => {
                    row[header.trim()] = values[idx] ? values[idx].trim() : '';
                });

                // Parse location codes (may be pipe-separated)
                const locationStr = row.event_locations || '';
                const locations = locationStr.split('|').map(c => c.trim()).filter(c => c);

                data.push({
                    x: parseFloat(row.map_vector_0) || 0,
                    y: parseFloat(row.map_vector_1) || 0,
                    z: parseFloat(row.map_vector_2) || 0,
                    title: row.title || row.text_name || 'Untitled',
                    date: row.Date || row.first_event_date || '',
                    type: row.Type || 'N/A',
                    url: row.SOURCEURL || '',
                    cluster: parseInt(row.cluster) || -1,
                    locations: locations
                });
            }

            document.getElementById('loading').style.display = 'none';
            renderSidebar();
            updateStats();
            renderTimeline();
            renderSummaryTable();
            render();
        }

        // Render sidebar
        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';

            let filteredData = showOutliers ? data : data.filter(d => d.cluster !== -1);

            // Filter by selected week if active
            if (selectedWeek) {
                filteredData = filteredData.filter(d => getWeekKey(d.date) === selectedWeek);
            }

            // Filter by selected type if active
            if (selectedType) {
                filteredData = filteredData.filter(d => (d.type || 'N/A') === selectedType);
            }

            // Filter by selected cluster if active
            if (selectedCluster !== null) {
                filteredData = filteredData.filter(d => d.cluster === selectedCluster);
            }

            // Filter by selected location if active
            if (selectedLocation) {
                filteredData = filteredData.filter(d => d.locations && d.locations.includes(selectedLocation));
            }

            // Reverse chronological order
            const sortedData = [...filteredData].sort((a, b) => {
                const dateA = parseDate(a.date);
                const dateB = parseDate(b.date);
                return dateB - dateA; // Most recent first
            });

            sortedData.forEach((item, displayIdx) => {
                const originalIdx = data.indexOf(item);
                const div = document.createElement('div');
                div.className = 'item';
                div.setAttribute('data-index', originalIdx);
                if (selectedIndex === originalIdx) div.classList.add('selected');

                const color = item.cluster === -1 ? OUTLIER_COLOR : CLUSTER_COLORS[item.cluster % CLUSTER_COLORS.length];

                div.innerHTML = `
                    <div class="item-title">${escapeHtml(item.title)}</div>
                    <div class="item-meta">${item.date} • ${item.type}</div>
                    <div class="item-cluster" style="background: ${color}; color: ${item.cluster === -1 ? '#000' : '#000'}">
                        CLUSTER ${item.cluster === -1 ? 'OUTLIER' : item.cluster}
                    </div>
                    ${item.url ? `<div style="margin-top: 4px;"><a class="item-link" href="${escapeHtml(item.url)}" target="_blank">${escapeHtml(item.url.substring(0, 60))}${item.url.length > 60 ? '...' : ''}</a></div>` : ''}
                `;

                div.addEventListener('click', (e) => {
                    e.preventDefault();
                    selectedIndex = originalIdx;
                    renderSidebar();
                    focusOnPoint(item);
                });

                sidebar.appendChild(div);
            });
        }

        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                const month = parseInt(parts[0]);
                const day = parseInt(parts[1]);
                const year = parseInt(parts[2]);
                return new Date(year, month - 1, day);
            }
            return new Date(0);
        }

        function getWeekKey(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                const month = parseInt(parts[0]);
                const day = parseInt(parts[1]);
                const year = parseInt(parts[2]);
                const date = new Date(year, month - 1, day);

                const startDate = new Date(config.timeline.startDate);
                if (date < startDate) return null;

                const diffTime = date - startDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                const weekNum = Math.floor(diffDays / 7);

                const weekStart = new Date(startDate);
                weekStart.setDate(startDate.getDate() + weekNum * 7);
                return `${weekStart.getFullYear()}-${String(weekStart.getMonth() + 1).padStart(2, '0')}-W${weekNum}`;
            }
            return null;
        }

        function highlightSidebarItem(dataIndex) {
            const sidebar = document.getElementById('sidebar');
            const targetDiv = sidebar.querySelector(`[data-index="${dataIndex}"]`);

            if (targetDiv) {
                // Clear previous highlight timeout
                if (highlightTimeout) {
                    clearTimeout(highlightTimeout);
                }

                // Remove previous highlights
                sidebar.querySelectorAll('.highlighted').forEach(el => {
                    el.classList.remove('highlighted');
                });

                // Add highlight
                targetDiv.classList.add('highlighted');

                // Scroll to item
                targetDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });

                // Remove highlight after 30 seconds
                highlightTimeout = setTimeout(() => {
                    targetDiv.classList.remove('highlighted');
                }, 30000);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Summary table rendering
        function renderSummaryTable() {
            const tableBody = document.getElementById('summary-table-body');
            const title = document.getElementById('summary-title');
            const toggle = document.getElementById('summary-toggle');

            let filteredData = showOutliers ? data : data.filter(d => d.cluster !== -1);

            // Filter by selected week if active
            if (selectedWeek) {
                filteredData = filteredData.filter(d => getWeekKey(d.date) === selectedWeek);
            }

            // Filter by selected type if active (only when not in type mode)
            if (selectedType && summaryMode !== 'type') {
                filteredData = filteredData.filter(d => (d.type || 'N/A') === selectedType);
            }

            // Filter by selected cluster if active (only when not in cluster mode)
            if (selectedCluster !== null && summaryMode !== 'cluster') {
                filteredData = filteredData.filter(d => d.cluster === selectedCluster);
            }

            // Filter by selected location if active
            if (selectedLocation) {
                filteredData = filteredData.filter(d => d.locations && d.locations.includes(selectedLocation));
            }

            if (summaryMode === 'type') {
                title.textContent = 'TYPE';
                toggle.textContent = 'CLUSTER';

                // Count by type
                const typeCounts = {};
                filteredData.forEach(d => {
                    const type = d.type || 'N/A';
                    typeCounts[type] = (typeCounts[type] || 0) + 1;
                });

                // Sort by count descending
                const sortedTypes = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);

                tableBody.innerHTML = sortedTypes.map(([type, count]) => {
                    const isSelected = selectedType === type;
                    return `
                        <tr class="${isSelected ? 'selected' : ''}" data-type="${escapeHtml(type)}">
                            <td>${escapeHtml(type)}</td>
                            <td>${count}</td>
                        </tr>
                    `;
                }).join('');

                // Add click handlers
                tableBody.querySelectorAll('tr').forEach(tr => {
                    tr.addEventListener('click', () => {
                        const type = tr.getAttribute('data-type');
                        // Toggle selection
                        if (selectedType === type) {
                            selectedType = null;
                        } else {
                            selectedType = type;
                            selectedCluster = null; // Clear cluster filter
                        }
                        renderSidebar();
                        renderTimeline();
                        renderSummaryTable();
                        render();
                    });
                });

            } else {
                title.textContent = 'CLUSTER';
                toggle.textContent = 'TYPE';

                // Count by cluster
                const clusterCounts = {};
                filteredData.forEach(d => {
                    const cluster = d.cluster;
                    clusterCounts[cluster] = (clusterCounts[cluster] || 0) + 1;
                });

                // Sort by count descending
                const sortedClusters = Object.entries(clusterCounts).sort((a, b) => {
                    const aNum = parseInt(a[0]);
                    const bNum = parseInt(b[0]);
                    // Outliers last
                    if (aNum === -1) return 1;
                    if (bNum === -1) return -1;
                    // Otherwise sort by count descending
                    return b[1] - a[1];
                });

                tableBody.innerHTML = sortedClusters.map(([cluster, count]) => {
                    const clusterNum = parseInt(cluster);
                    const color = clusterNum === -1 ? OUTLIER_COLOR : CLUSTER_COLORS[clusterNum % CLUSTER_COLORS.length];
                    const label = clusterNum === -1 ? 'OUTLIER' : clusterNum;
                    const isSelected = selectedCluster === clusterNum;

                    return `
                        <tr class="${isSelected ? 'selected' : ''}" data-cluster="${clusterNum}">
                            <td>
                                <span class="cluster-color" style="background: ${color};"></span>${label}
                            </td>
                            <td>${count}</td>
                        </tr>
                    `;
                }).join('');

                // Add click handlers
                tableBody.querySelectorAll('tr').forEach(tr => {
                    tr.addEventListener('click', () => {
                        const cluster = parseInt(tr.getAttribute('data-cluster'));
                        // Toggle selection
                        if (selectedCluster === cluster) {
                            selectedCluster = null;
                        } else {
                            selectedCluster = cluster;
                            selectedType = null; // Clear type filter
                        }
                        renderSidebar();
                        renderTimeline();
                        renderSummaryTable();
                        render();
                    });
                });
            }
        }

        // Update stats
        function updateStats() {
            const clusters = new Set(data.map(d => d.cluster));
            const outliers = data.filter(d => d.cluster === -1).length;
            const visible = showOutliers ? data.length : data.length - outliers;

            document.getElementById('stats').textContent =
                `NODES: ${visible}/${data.length} • CLUSTERS: ${clusters.size - 1} • OUTLIERS: ${outliers}`;
        }

        // Focus camera on point
        function focusOnPoint(point) {
            camera.x = -point.x;
            camera.y = -point.y;
            camera.z = 5;
            render();
        }

        // 3D rendering
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            render();
        }

        function project(x, y, z) {
            const scale = 800 / (z + camera.z);
            return {
                x: (x + camera.x) * scale + canvas.width / 2,
                y: (y + camera.y) * scale + canvas.height / 2,
                scale: scale
            };
        }

        function rotate(x, y, z) {
            // Rotate around Y axis
            const cosY = Math.cos(camera.rotY);
            const sinY = Math.sin(camera.rotY);
            const x1 = x * cosY - z * sinY;
            const z1 = x * sinY + z * cosY;

            // Rotate around X axis
            const cosX = Math.cos(camera.rotX);
            const sinX = Math.sin(camera.rotX);
            const y1 = y * cosX - z1 * sinX;
            const z2 = y * sinX + z1 * cosX;

            return { x: x1, y: y1, z: z2 };
        }

        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const points = [];

            data.forEach((point, idx) => {
                if (!showOutliers && point.cluster === -1) return;

                // Filter by selected week if active
                if (selectedWeek && getWeekKey(point.date) !== selectedWeek) return;

                // Filter by selected type if active
                if (selectedType && (point.type || 'N/A') !== selectedType) return;

                // Filter by selected cluster if active
                if (selectedCluster !== null && point.cluster !== selectedCluster) return;

                // Filter by selected location if active
                if (selectedLocation && (!point.locations || !point.locations.includes(selectedLocation))) return;

                const rotated = rotate(point.x, point.y, point.z);
                const projected = project(rotated.x, rotated.y, rotated.z);

                points.push({
                    x: projected.x,
                    y: projected.y,
                    z: rotated.z,
                    scale: projected.scale,
                    cluster: point.cluster,
                    index: idx
                });
            });

            // Sort by depth
            points.sort((a, b) => a.z - b.z);

            // Store rendered points for hit detection
            window.renderedPoints = points;

            // Draw points
            points.forEach(p => {
                const size = Math.max(config.pointSize.min, Math.min(config.pointSize.max, p.scale * config.pointSize.scale));
                const color = p.cluster === -1 ? OUTLIER_COLOR : CLUSTER_COLORS[p.cluster % CLUSTER_COLORS.length];

                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                ctx.fill();

                // Highlight selected
                if (p.index === selectedIndex) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size + 3, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
        }

        // Tooltip functions
        function showTooltip(point, x, y) {
            const tooltip = document.getElementById('tooltip');
            const color = point.cluster === -1 ? OUTLIER_COLOR : CLUSTER_COLORS[point.cluster % CLUSTER_COLORS.length];

            tooltip.innerHTML = `
                <div class="tooltip-title">${escapeHtml(point.title)}</div>
                <div class="tooltip-meta">${point.date} • ${point.type}</div>
                <div class="tooltip-cluster" style="background: ${color}; color: ${point.cluster === -1 ? '#000' : '#000'}">
                    CLUSTER ${point.cluster === -1 ? 'OUTLIER' : point.cluster}
                </div>
            `;

            tooltip.style.display = 'block';
            tooltip.style.left = (x + 15) + 'px';
            tooltip.style.top = (y + 15) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function findPointAtMouse(mouseX, mouseY) {
            if (!window.renderedPoints) return null;

            // Check from front to back (reverse order)
            for (let i = window.renderedPoints.length - 1; i >= 0; i--) {
                const p = window.renderedPoints[i];
                const size = Math.max(config.pointSize.min, Math.min(config.pointSize.max, p.scale * config.pointSize.scale));
                const dx = mouseX - p.x;
                const dy = mouseY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist <= size + 2) {
                    return data[p.index];
                }
            }
            return null;
        }

        // Mouse controls
        canvas.addEventListener('mousedown', e => {
            mouse.down = true;
            mouse.lastX = e.clientX;
            mouse.lastY = e.clientY;

            // Store initial position to detect clicks vs drags
            mouse.startX = e.clientX;
            mouse.startY = e.clientY;
        });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (mouse.down) {
                const dx = e.clientX - mouse.lastX;
                const dy = e.clientY - mouse.lastY;

                camera.rotY += dx * 0.005;
                camera.rotX += dy * 0.005;

                mouse.lastX = e.clientX;
                mouse.lastY = e.clientY;

                hideTooltip();
                render();
            } else {
                // Show tooltip on hover
                const point = findPointAtMouse(mouseX, mouseY);
                if (point) {
                    showTooltip(point, e.clientX, e.clientY);
                    canvas.style.cursor = 'pointer';
                } else {
                    hideTooltip();
                    canvas.style.cursor = 'default';
                }
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Check if this was a click (not a drag)
            const dx = e.clientX - mouse.startX;
            const dy = e.clientY - mouse.startY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 5) {
                // This was a click, not a drag
                const point = findPointAtMouse(mouseX, mouseY);
                if (point) {
                    const dataIndex = data.indexOf(point);
                    selectedIndex = dataIndex;
                    highlightSidebarItem(dataIndex);
                    renderSidebar();
                    render();
                }
            }

            mouse.down = false;
        });

        canvas.addEventListener('mouseleave', () => {
            hideTooltip();
            canvas.style.cursor = 'default';
        });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            camera.z += e.deltaY * 0.01;
            camera.z = Math.max(1, Math.min(20, camera.z));
            render();
        });

        // Timeline rendering
        const timelineCanvas = document.getElementById('timeline-canvas');
        const timelineCtx = timelineCanvas.getContext('2d');

        function resizeTimeline() {
            const container = document.getElementById('timeline');
            timelineCanvas.width = container.clientWidth;
            timelineCanvas.height = container.clientHeight;
            renderTimeline();
        }

        function renderTimeline() {
            if (!data.length) return;

            const width = timelineCanvas.width;
            const height = timelineCanvas.height;

            timelineCtx.fillStyle = '#000';
            timelineCtx.fillRect(0, 0, width, height);

            // Parse dates and group by week
            const dateCounts = {};
            const startDate = new Date(config.timeline.startDate);

            data.forEach(d => {
                if (!showOutliers && d.cluster === -1) return;

                // Filter by selected type if active
                if (selectedType && (d.type || 'N/A') !== selectedType) return;

                // Filter by selected cluster if active
                if (selectedCluster !== null && d.cluster !== selectedCluster) return;

                // Filter by selected location if active
                if (selectedLocation && (!d.locations || !d.locations.includes(selectedLocation))) return;

                const dateStr = d.date;
                if (!dateStr) return;

                // Parse date (format: MM/DD/YYYY)
                const parts = dateStr.split('/');
                if (parts.length === 3) {
                    const month = parseInt(parts[0]);
                    const day = parseInt(parts[1]);
                    const year = parseInt(parts[2]);
                    const date = new Date(year, month - 1, day);

                    // Filter dates before July 2025
                    if (date < startDate) return;

                    // Calculate week number from start date
                    const diffTime = date - startDate;
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    const weekNum = Math.floor(diffDays / 7);

                    // Create week key
                    const weekStart = new Date(startDate);
                    weekStart.setDate(startDate.getDate() + weekNum * 7);
                    const key = `${weekStart.getFullYear()}-${String(weekStart.getMonth() + 1).padStart(2, '0')}-W${weekNum}`;

                    dateCounts[key] = (dateCounts[key] || 0) + 1;
                }
            });

            const sortedKeys = Object.keys(dateCounts).sort();
            if (sortedKeys.length === 0) return;

            const maxCount = Math.max(...Object.values(dateCounts));
            const barWidth = Math.max(1, (width - 40) / sortedKeys.length);
            const chartHeight = height - 30;

            // Store bars for hit detection
            window.timelineBars = sortedKeys.map((key, i) => {
                const count = dateCounts[key];
                const barHeight = (count / maxCount) * chartHeight;
                const x = 20 + i * barWidth;
                const y = height - 20 - barHeight;
                return { key, x, y, width: Math.max(1, barWidth - 1), height: barHeight };
            });

            // Draw bars
            window.timelineBars.forEach(bar => {
                const isSelected = selectedWeek === bar.key;
                timelineCtx.fillStyle = isSelected ? '#ff6b6b' : '#4a90e2';
                timelineCtx.fillRect(bar.x, bar.y, bar.width, bar.height);
            });

            // Draw axis
            timelineCtx.strokeStyle = '#333';
            timelineCtx.lineWidth = 1;
            timelineCtx.beginPath();
            timelineCtx.moveTo(20, height - 20);
            timelineCtx.lineTo(width - 20, height - 20);
            timelineCtx.stroke();

            // Draw labels
            timelineCtx.fillStyle = '#666';
            timelineCtx.font = '9px Courier New';
            timelineCtx.textAlign = 'center';

            // Show month labels at month boundaries
            let lastMonth = '';
            sortedKeys.forEach((key, i) => {
                const [yearMonth] = key.split('-W');
                const [year, month] = yearMonth.split('-');
                const currentMonth = `${month}/${year}`;

                if (currentMonth !== lastMonth) {
                    const x = 20 + i * barWidth;
                    timelineCtx.fillText(currentMonth, x, height - 6);
                    lastMonth = currentMonth;
                }
            });

            // Draw max count label
            timelineCtx.textAlign = 'right';
            timelineCtx.fillText(maxCount.toString(), 15, 15);
        }

        // Timeline click handler
        timelineCanvas.addEventListener('click', (e) => {
            const rect = timelineCanvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (!window.timelineBars) return;

            // Find clicked bar
            for (let bar of window.timelineBars) {
                if (mouseX >= bar.x && mouseX <= bar.x + bar.width &&
                    mouseY >= bar.y && mouseY <= bar.y + bar.height) {

                    // Toggle selection
                    if (selectedWeek === bar.key) {
                        selectedWeek = null;
                    } else {
                        selectedWeek = bar.key;
                    }

                    // Update all views
                    renderSidebar();
                    renderTimeline();
                    renderSummaryTable();
                    render();
                    return;
                }
            }

            // Click outside bars - clear filter
            selectedWeek = null;
            renderSidebar();
            renderTimeline();
            renderSummaryTable();
            render();
        });

        // Timeline hover cursor
        timelineCanvas.addEventListener('mousemove', (e) => {
            const rect = timelineCanvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (!window.timelineBars) return;

            let onBar = false;
            for (let bar of window.timelineBars) {
                if (mouseX >= bar.x && mouseX <= bar.x + bar.width &&
                    mouseY >= bar.y && mouseY <= bar.y + bar.height) {
                    onBar = true;
                    break;
                }
            }

            timelineCanvas.style.cursor = onBar ? 'pointer' : 'default';
        });

        // Summary table toggle
        document.getElementById('summary-toggle').addEventListener('click', () => {
            summaryMode = summaryMode === 'type' ? 'cluster' : 'type';
            renderSummaryTable();
        });

        // Toggle outliers
        document.getElementById('toggle-outliers').addEventListener('change', e => {
            showOutliers = e.target.checked;
            renderSidebar();
            updateStats();
            renderTimeline();
            renderSummaryTable();
            render();
        });

        // Listen for filter updates from dashboard
        function checkDashboardFilters() {
            try {
                const filtersJson = localStorage.getItem('dashboardFilters')
                if (filtersJson) {
                    const filters = JSON.parse(filtersJson)
                    // Only apply if this is a new update
                    if (filters.timestamp > lastDashboardFilterTimestamp) {
                        lastDashboardFilterTimestamp = filters.timestamp

                        // Apply filters from dashboard
                        selectedWeek = filters.selectedWeek
                        selectedCluster = filters.selectedCluster
                        selectedLocation = filters.selectedLocation

                        // Update all views
                        renderSidebar()
                        renderTimeline()
                        renderSummaryTable()
                        render()
                    }
                }
            } catch (e) {
                console.error('Error reading dashboard filters:', e)
            }
        }

        // Poll for filter updates every 500ms
        setInterval(checkDashboardFilters, 500)

        // Initialize
        window.addEventListener('resize', () => {
            resizeCanvas();
            resizeTimeline();
        });
        resizeCanvas();
        resizeTimeline();

        // Load config first, then data
        loadConfig().then(() => {
            loadData();
        });
    </script>
</body>
</html>
